name: Build & Release

on:
  push:
    branches:
      - main
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            platform: mac
          - os: windows-latest
            platform: win
          - os: ubuntu-latest
            platform: linux

    runs-on: ${{ matrix.os }}

    steps:
      - name: Code auschecken
        uses: actions/checkout@v4

      - name: Node.js einrichten
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Linux Build-Tools installieren
        if: matrix.os == 'ubuntu-latest'
        run: sudo apt-get install -y build-essential python3 libx11-dev libxkbfile-dev

      - name: Windows Build-Tools installieren
        if: matrix.os == 'windows-latest'
        shell: powershell
        run: |
          npm install --global --prefer-offline node-gyp
          echo "node-gyp installed"

      - name: Dependencies installieren
        run: npm install

      - name: App bauen (macOS)
        if: matrix.os == 'macos-latest'
        run: npx electron-builder --mac dmg --publish never

      - name: App bauen (Windows)
        if: matrix.os == 'windows-latest'
        run: npx electron-builder --win nsis --publish never

      - name: App bauen (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: npx electron-builder --linux AppImage --publish never

      - name: Artifacts hochladen
        uses: actions/upload-artifact@v4
        with:
          name: build-${{ matrix.platform }}
          path: |
            dist/*.dmg
            dist/*.exe
            dist/*.AppImage
          if-no-files-found: ignore

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Artifacts herunterladen
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: GitHub Release erstellen
        uses: softprops/action-gh-release@v2
        with:
          files: dist/**/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
